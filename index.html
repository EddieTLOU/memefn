<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meme Central</title>
    <link rel="icon" type="image/png" href="https://venngage-wordpress.s3.amazonaws.com/uploads/2022/09/meme_this_is_fine_dog.png">
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .home-menu { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 90%; 
            max-width: 450px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Menu Header Icon */
        .menu-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #meme-img { 
            max-width: 100%; 
            border-radius: 15px; 
            margin: 20px 0; 
            display: none; 
            transition: opacity 0.3s ease;
        }

        .btn-stack { display: grid; gap: 12px; }
        button { 
            padding: 14px; border-radius: 15px; border: none; background: rgba(255,255,255,0.1); 
            color: white; font-weight: 600; cursor: pointer; backdrop-filter: blur(5px); 
            transition: all 0.3s ease;
        }
        button:hover { background: rgba(255,255,255,0.2); transform: scale(1.02); }
        #find-btn { background: #e63946; }
        #find-btn:hover { background: #d62828; }
    </style>
</head>
<body>

<div class="home-menu">
    <img src="https://venngage-wordpress.s3.amazonaws.com/uploads/2022/09/meme_this_is_fine_dog.png" class="menu-icon" alt="Icon">
    <h1 id="title" style="color: white; font-size: 1.4rem; margin: 0 0 10px 0;">Meme Home</h1>
    
    <img id="meme-img" src="" alt="Meme">
    
    <div class="btn-stack">
        <button id="find-btn" onclick="fetchMeme()">Find New Meme</button>
        <button onclick="copyLink()">Copy Image Address</button>
        <a id="dl" href="#" download="meme.jpg" style="text-decoration:none;">
            <button style="width:100%">Download Image</button>
        </a>
    </div>
</div>

<script>
    async function fetchMeme() {
        const img = document.getElementById('meme-img');
        img.style.opacity = 0;
        
        const res = await fetch('https://api.imgflip.com/get_memes');
        const data = await res.json();
        const m = data.data.memes[Math.floor(Math.random() * data.data.memes.length)];
        
        img.src = m.url;
        img.style.display = 'block';
        img.style.opacity = 1;
        document.getElementById('title').innerText = m.name;
        document.getElementById('dl').href = m.url;
    }

    function copyLink() {
        const url = document.getElementById('meme-img').src;
        if(url) {
            navigator.clipboard.writeText(url);
            alert("Image URL copied!");
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Random Meme Finder</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a1a; color: white; margin: 0; }
        .card { background: #2d2d2d; padding: 25px; border-radius: 15px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        img { max-width: 100%; height: auto; max-height: 400px; margin: 20px 0; border-radius: 10px; display: none; border: 2px solid #444; }
        .controls { display: grid; gap: 10px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; background: #444; color: white; transition: 0.2s; }
        button:hover { background: #666; }
        #find-btn { background: #e67e22; }
        #find-btn:hover { background: #d35400; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Click to find a meme</h2>
    <img id="img" src="" alt="Meme">
    <div class="controls">
        <button id="find-btn" onclick="fetchMeme()">Find Random Meme</button>
        <button onclick="copyLink()">Copy Image Address</button>
        <a id="dl" href="#" download="meme.jpg"><button style="width:100%">Download Image</button></a>
    </div>
</div>

<script>
    // This fetches directly from the Imgflip library of 500+ templates
    async function fetchMeme() {
        const response = await fetch('https://api.imgflip.com/get_memes');
        const data = await response.json();
        const memes = data.data.memes;
        const randomMeme = memes[Math.floor(Math.random() * memes.length)];
        
        const img = document.getElementById('img');
        img.src = randomMeme.url;
        img.style.display = 'block';
        document.getElementById('title').innerText = randomMeme.name;
        document.getElementById('dl').href = randomMeme.url;
    }

    function copyLink() {
        const url = document.getElementById('img').src;
        if(url) {
            navigator.clipboard.writeText(url);
            alert("Copied link to clipboard!");
        }
    }
</script>
</body>
</html>
